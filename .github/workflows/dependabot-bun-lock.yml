name: Sync bun.lock (Dependabot)

# Dependabot updates package.json files but does not natively support bun
# lockfiles, so PRs land with a stale `bun.lock`. Our CI runs
# `bun install --frozen-lockfile` and aborts with
# "lockfile had changes, but lockfile is frozen".
#
# This workflow runs on Dependabot PRs only, regenerates `bun.lock`, and
# pushes the update to the same PR branch. CI is then re-triggered by
# the new commit.

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    # Match the PR author so the workflow still runs when a maintainer
    # reopens or rebases the PR (github.actor would be the maintainer then).
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref }}
          # token defaults to GITHUB_TOKEN scoped by `permissions` above —
          # writes to a dependabot/* branch are allowed.

      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2

      - name: Refresh bun.lock against updated package.json
        run: bun install --no-frozen-lockfile

      - name: Commit and push if lockfile changed
        run: |
          if [[ -n "$(git status --porcelain bun.lock)" ]]; then
            git config user.name "dependabot[bot]"
            git config user.email "49699333+dependabot[bot]@users.noreply.github.com"
            git add bun.lock
            git commit -m "chore: sync bun.lock"
            git push
          else
            echo "bun.lock already in sync — nothing to do."
          fi

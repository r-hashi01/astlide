name: Release

# Trusted Publishing (OIDC) is configured on npm for both @astlide/core and
# create-astlide via `npm trust github ... --file release.yml --repo r-hashi01/astlide`.
# No NPM_TOKEN is needed — npm verifies this workflow's id-token at publish time.
on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to create the "Version Packages" PR + tags
      pull-requests: write  # Required to open the Version Packages PR
      id-token: write       # Required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0    # changesets needs full history for changelog generation

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          # Node 24 (LTS) ships with npm 11 — Trusted Publishing requires npm
          # 11.5.1+ for the OIDC handshake. Node 22 ships with npm 10 and
          # silently falls back to anonymous publish → 404. See
          # https://github.com/npm/cli/issues/8976
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: bun run version
          publish: bun run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `npm publish --provenance` triggers the OIDC handshake that npm Trusted
          # Publishing requires. Without it, `changeset publish` calls `npm publish`
          # in plain mode → registry returns 404 (anonymous). Setting it via env
          # avoids polluting package.json's publishConfig (which would break local
          # `npm publish` outside GitHub Actions OIDC).
          NPM_CONFIG_PROVENANCE: "true"

name: Release

# Trusted Publishing (OIDC) is configured on npm for both @astlide/core and
# create-astlide via `npm trust github ... --file release.yml --repo r-hashi01/astlide`.
# No NPM_TOKEN is needed — npm verifies this workflow's id-token at publish time.
on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to create the "Version Packages" PR + tags
      pull-requests: write  # Required to open the Version Packages PR
      id-token: write       # Required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0    # changesets needs full history for changelog generation

      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: latest

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          # changesets/action shells out to `npm publish`; npm 11.5.1+ on Node 22.14+
          # is required for Trusted Publishing OIDC.
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: bun run version
          publish: bun run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

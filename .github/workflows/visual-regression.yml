name: Visual Regression

# Visual regression baselines are captured on macOS — Linux runners render
# fonts differently and produce noisy false positives. Run on macOS-latest
# nightly + on demand, not on every PR.

on:
  schedule:
    - cron: "0 12 * * 1" # Monday 12:00 UTC weekly
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Regenerate baselines (commits changes? — no, just produces artifacts)"
        type: boolean
        default: false

jobs:
  visual:
    name: Visual diff
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.2.19
      - run: bun install --frozen-lockfile
      - name: Run visual regression suite
        run: bun run test:e2e
        env:
          UPDATE_SNAPSHOTS: ${{ inputs.update_snapshots && '1' || '' }}
      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-diffs
          path: e2e/__snapshots__/visual/actual/
          if-no-files-found: ignore
      - name: Upload regenerated baselines
        if: ${{ inputs.update_snapshots }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: regenerated-baselines
          path: e2e/__snapshots__/visual/*.png
